<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg    { fill: #F9F9F7; }
    .frame { stroke: #111111; fill: #F9F9F7; }
    .mark  { stroke: #111111; fill: #F9F9F7; }
    .echo  { stroke: #111111; fill: none; opacity: 0.35; }
    @media (prefers-color-scheme: dark) {
      .bg    { fill: #111111; }
      .frame { stroke: #F9F9F7; fill: #111111; }
      .mark  { stroke: #F9F9F7; fill: #111111; }
      .echo  { stroke: #F9F9F7; }
    }
  </style>

  <!-- rounded-square frame -->
  <rect class="frame" x="6" y="6" width="88" height="88" rx="22" ry="22"
    stroke-width="3"/>

  <!-- NL monogram, scaled and centred inside the frame -->
  <g transform="translate(15.98,15.98) scale(0.81)">
    <!-- N: left bar -->
    <path class="mark" d="M5,11 L16,11 L16,79 L5,79 Z"
      stroke-width="2.2" stroke-linejoin="miter"/>
    <!-- N: diagonal -->
    <path class="mark" d="M16,11 L27,11 L37,79 L26,79 Z"
      stroke-width="2.2" stroke-linejoin="miter"/>
    <!-- N: right bar -->
    <path class="mark" d="M37,11 L48,11 L48,79 L37,79 Z"
      stroke-width="2.2" stroke-linejoin="miter"/>

    <!-- N: inner echoes -->
    <path class="echo" d="M7,14 L14,14 L14,76 L7,76 Z"   stroke-width="1"/>
    <path class="echo" d="M18,14 L25,14 L35,76 L28,76 Z" stroke-width="1"/>
    <path class="echo" d="M39,14 L46,14 L46,76 L39,76 Z" stroke-width="1"/>

    <!-- L: vertical bar -->
    <path class="mark" d="M54,5 L65,5 L65,79 L54,79 Z"
      stroke-width="2.2" stroke-linejoin="miter"/>
    <!-- L: horizontal base -->
    <path class="mark" d="M54,70 L79,70 L79,79 L54,79 Z"
      stroke-width="2.2" stroke-linejoin="miter"/>

    <!-- L: inner echoes -->
    <path class="echo" d="M56,8 L63,8 L63,76 L56,76 Z"   stroke-width="1"/>
    <path class="echo" d="M56,72 L77,72 L77,76 L56,76 Z" stroke-width="1"/>
  </g>
</svg>
